#version: '3'

postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
      POSTGRES_DB: quizdb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz"]
      interval: 5s
      timeout: 5s
      retries: 5

#o backend só inicia quando o banco estiver pronto.
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
#    volumes:
#    - ./backend:/usr/src/app
#    - /usr/src/app/node_modules

 frontend:
   build: ./frontend
   ports:
     - "5173:5173"